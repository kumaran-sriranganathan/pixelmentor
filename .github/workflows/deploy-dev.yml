name: Deploy to Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend Tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_ANON_KEY: "mock-anon-key"
          SUPABASE_SERVICE_KEY: "mock-service-key"
          SUPABASE_JWT_SECRET: "mock-jwt-secret"
          OPENAI_API_KEY: "mock-openai-key"
          TYPESENSE_HOST: "mock.typesense.net"
          TYPESENSE_API_KEY: "mock-typesense-key"
          CLOUDFLARE_ACCOUNT_ID: "mock-account-id"
          R2_ACCESS_KEY_ID: "mock-r2-key"
          R2_SECRET_ACCESS_KEY: "mock-r2-secret"
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=test-results.xml \
            -v

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-dev
          path: backend/test-results.xml

  # ─────────────────────────────────────────────
  # 2. Deploy to Railway (Dev)
  # Railway auto-deploys on push to dev branch.
  # This step just verifies the deployment health.
  # ─────────────────────────────────────────────
  verify-deployment:
    name: Verify Dev Deployment
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Wait for Railway deployment
        run: sleep 60

      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.RAILWAY_DEV_URL }}/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed with status: ${HTTP_STATUS}"
            exit 1
          fi
          echo "✅ Dev deployment healthy"
