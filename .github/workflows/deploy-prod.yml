name: Deploy to Prod

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_PROD }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ACR_LOGIN_SERVER: pmprodacr.azurecr.io           # Prod ACR (set after prod infra deployed)
  CONTAINER_APP_NAME: pm-prod-api
  RESOURCE_GROUP: pixelmentor-prod-rg
  TF_WORKING_DIR: terraform

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend Tests (must pass before anything)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          AZURE_OPENAI_ENDPOINT: "https://mock.openai.azure.com"
          COSMOS_DB_ENDPOINT: "https://mock.cosmos.azure.com"
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=test-results.xml \
            -v

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-prod
          path: backend/test-results.xml

  # ─────────────────────────────────────────────
  # 2. Terraform Plan (Prod — read-only preview)
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (Prod)
    runs-on: ubuntu-latest
    environment: prod-plan   # No approval required — just shows the plan
    needs: backend-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC — Prod)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.x"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=pixelmentor-prod-rg" \
            -backend-config="storage_account_name=pmprodstprod01" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=pixelmentor.prod.tfstate"

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="prod.tfvars" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Manual Approval Gate
  #    Configured in GitHub → Environments → prod
  #    Add required reviewers there.
  # ─────────────────────────────────────────────
  await-approval:
    name: Await Manual Approval
    runs-on: ubuntu-latest
    environment: prod          # ← This environment has required reviewers set
    needs: terraform-plan

    steps:
      - name: Approval granted
        run: echo "✅ Deployment to prod approved."

  # ─────────────────────────────────────────────
  # 4. Terraform Apply (Prod)
  # ─────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply (Prod)
    runs-on: ubuntu-latest
    environment: prod
    needs: await-approval

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC — Prod)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_WORKING_DIR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.x"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=pixelmentor-prod-rg" \
            -backend-config="storage_account_name=pmprodstprod01" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=pixelmentor.prod.tfstate"

      - name: Terraform Apply (saved plan)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────────────
  # 5. Build & Push Docker Image (Prod ACR)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image (Prod)
    runs-on: ubuntu-latest
    environment: prod
    needs: await-approval
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC — Prod)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Prod ACR
        run: az acr login --name pmprodacr

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          IMAGE_TAG="${{ env.ACR_LOGIN_SERVER }}/pixelmentor-api:prod-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_LOGIN_SERVER }}/pixelmentor-api:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 6. Deploy to Container App (Prod)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod
    needs: [terraform-apply, build-and-push]

    steps:
      - name: Azure Login (OIDC — Prod)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.build-and-push.outputs.image_tag }}

      - name: Verify Deployment
        run: |
          echo "Waiting for deployment to stabilise..."
          sleep 30
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Checking health at: https://${FQDN}/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed with status: ${HTTP_STATUS}"
            exit 1
          fi
          echo "✅ Production deployment healthy — ${FQDN}"
