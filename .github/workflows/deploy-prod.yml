name: Deploy to Prod

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend Tests
  # Must pass before release builds proceed.
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_ANON_KEY: "mock-anon-key"
          SUPABASE_SERVICE_KEY: "mock-service-key"
          SUPABASE_JWT_SECRET: "mock-jwt-secret"
          OPENAI_API_KEY: "mock-openai-key"
          CLOUDFLARE_ACCOUNT_ID: "mock-account-id"
          R2_ACCESS_KEY_ID: "mock-r2-key"
          R2_SECRET_ACCESS_KEY: "mock-r2-secret"
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=test-results.xml \
            -v

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-prod
          path: backend/test-results.xml

  # ─────────────────────────────────────────────
  # NOTE: Railway prod deployment not configured yet.
  # Currently running a single Railway environment.
  # When ready to split dev/prod:
  #   1. Create a new Railway service for prod
  #   2. Add RAILWAY_PROD_URL to GitHub secrets
  #   3. Set ENVIRONMENT=prod, ALLOWED_ORIGINS,
  #      ALLOWED_HOSTS on the prod Railway service
  #   4. Re-add the deployment and health check jobs
  # ─────────────────────────────────────────────
