name: PR Checks

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend Tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_ANON_KEY: "mock-anon-key"
          SUPABASE_SERVICE_KEY: "mock-service-key"
          SUPABASE_JWT_SECRET: "mock-jwt-secret"
          OPENAI_API_KEY: "mock-openai-key"
          CLOUDFLARE_ACCOUNT_ID: "mock-account-id"
          R2_ACCESS_KEY_ID: "mock-r2-key"
          R2_SECRET_ACCESS_KEY: "mock-r2-secret"
        run: |
          pytest tests/ \
            --tb=short \
            --junitxml=test-results.xml \
            -v

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: backend/test-results.xml

  # ─────────────────────────────────────────────
  # 2. Android Build Check
  # Verifies the Android app compiles on every PR.
  # Does not upload the APK — just checks it builds.
  # ─────────────────────────────────────────────
  android-build-check:
    name: Android Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant gradlew execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew assembleDebug --no-daemon
